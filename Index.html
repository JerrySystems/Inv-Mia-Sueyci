<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación</title>

  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
    }

    .contenedor {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .botones {
      display: none;
      position: absolute;
      bottom: 45px;
      left: 0;
      width: 100%;
      text-align: center;
      z-index: 10;
    }

    .botones a {
      display: block;
      margin: 12px auto;
      width: 80%;
      padding: 15px;
      border-radius: 30px;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      color: white;
    }

    .confirmar {
      background: #25D366;
    }

    .waze {
      background: #33CCFF;
    }
  </style>
</head>

<body>

  <div class="contenedor">
    <video id="videoInvitacion" controls playsinline>
      <source src="invitacion.mp4" type="video/mp4">
    </video>

    <div class="botones" id="botones">
      <a class="confirmar" href="https://calendar.app.google/M2isHzwbVkqnKxbUA" target="_blank">
        Confirmar asistencia
      </a>

      <a class="waze" href="https://waze.com/ul/h9g6hm4qmf" target="_blank">
        Cómo llegar con Waze
      </a>
    </div>
  </div>

  <script>
    const video = document.getElementById("videoInvitacion");
    const botones = document.getElementById("botones");

    video.addEventListener("ended", function() {
      botones.style.display = "block";
    });
  </script>

</body>
</html>
